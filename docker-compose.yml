
services:
  postgres:
    image: postgres:15
    container_name: document_processing_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [document_processing]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: document_processing_redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks: [document_processing]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Opcional, útil para S3 en dev
  localstack:
    image: localstack/localstack:latest
    container_name: document_processing_localstack
    ports:
      - "4566:4566"
      - "4571:4571"
    environment:
      SERVICES: s3
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ${AWS_REGION}
    volumes:
      - "./scripts/localstack:/etc/localstack/init/ready.d"
    tmpfs:
      - /tmp/localstack
    networks: [document_processing]
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3 ls || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: document_processing_api
    env_file: [.env]
    environment:
      # Garantizamos hostnames de servicios en docker
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Si usas LocalStack en dev:
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: ${AWS_REGION}
    ports:
      - "${API_PORT}:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      localstack:
        condition: service_healthy
    networks: [document_processing]
    # Para desarrollo con recarga en caliente, descomenta:
    # command: sh -c "alembic upgrade head && uvicorn apps.api.src.api.main:app --host 0.0.0.0 --port 8000 --reload"
    # Si prefieres usar el CMD del Dockerfile y entrypoint, no pongas 'command' aquí.

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: document_processing_worker
    env_file: [.env]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: ${AWS_REGION}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      localstack:
        condition: service_healthy
    networks: [document_processing]
    command: python -m apps.api.src.worker.run_rq

volumes:
  postgres_data:
  redis_data:
  localstack_data:

networks:
  document_processing:
    driver: bridge
