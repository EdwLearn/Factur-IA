[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    --asyncio-mode=auto

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require external services)
    slow: Slow tests
    aws: Tests that require AWS services
    ml: Tests that use ML models

env =
    ENVIRONMENT=test
    DB_HOST=localhost
    DB_PORT=5433
    DB_NAME=facturia_test
    DB_USER=postgres
    DB_PASSWORD=postgres
    REDIS_HOST=localhost
    REDIS_PORT=6380
    AWS_ENDPOINT_URL=http://localhost:4566
    S3_DOCUMENT_BUCKET=facturia-test-documents
