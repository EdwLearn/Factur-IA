# ── API service ───────────────────────────────────────────────────────────────
[[services]]
name = "api"
source = "."

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[services.deploy]
startCommand = "./apps/api/entrypoint.sh"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

# ── Web service ───────────────────────────────────────────────────────────────
[[services]]
name = "web"
source = "."

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"

[services.deploy]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
