# Production Docker Compose configuration
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: facturia-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-facturia_production}
      POSTGRES_USER: ${DB_USER:-facturia_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-facturia_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - facturia-network

  redis:
    image: redis:7-alpine
    container_name: facturia-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?Redis password required}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - facturia-network

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/api/Dockerfile
    container_name: facturia-api
    environment:
      ENVIRONMENT: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-facturia_production}
      DB_USER: ${DB_USER:-facturia_user}
      DB_PASSWORD: ${DB_PASSWORD:?Database password required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Redis password required}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_DOCUMENT_BUCKET: ${S3_DOCUMENT_BUCKET:?S3 bucket required}
      SECRET_KEY: ${SECRET_KEY:?JWT secret key required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped
    networks:
      - facturia-network

  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    container_name: facturia-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped
    networks:
      - facturia-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  facturia-network:
    driver: bridge
