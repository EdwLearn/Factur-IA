# Development Docker Compose configuration
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: facturia-postgres-dev
    environment:
      POSTGRES_DB: facturia_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - facturia-dev

  redis:
    image: redis:7-alpine
    container_name: facturia-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - facturia-dev

  localstack:
    image: localstack/localstack:latest
    container_name: facturia-localstack-dev
    environment:
      SERVICES: s3,textract
      DEBUG: 1
      DATA_DIR: /tmp/localstack/data
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - localstack_data:/tmp/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "4566:4566"
      - "4571:4571"
    networks:
      - facturia-dev

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/api/Dockerfile.dev
    container_name: facturia-api-dev
    environment:
      ENVIRONMENT: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: facturia_dev
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      S3_DOCUMENT_BUCKET: facturia-documents-dev
      SECRET_KEY: dev-secret-key-change-in-production
      LOG_LEVEL: DEBUG
    volumes:
      - ../../apps/api:/app
      - ../../packages/python-utils:/app/packages/python-utils
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_started
    ports:
      - "8000:8000"
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - facturia-dev

  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/web/Dockerfile.dev
    container_name: facturia-web-dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    volumes:
      - ../../apps/web:/app/apps/web
      - ../../packages/shared-types:/app/packages/shared-types
      - /app/node_modules
      - /app/apps/web/node_modules
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - facturia-dev

volumes:
  postgres_dev_data:
  redis_dev_data:
  localstack_data:

networks:
  facturia-dev:
    driver: bridge
